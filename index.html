<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SegnalaOra — Mappa Segnalazioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --amber: #d4820a;
    --sage: #3d5a47;
    --rust: #c0392b;
    --mist: #e8e2d6;
    --shadow: rgba(26,18,8,0.12);
    --panel: 320px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    z-index: 200;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--amber);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 600;
  }

  header p {
    font-size: 0.75rem;
    color: #a8a090;
    font-weight: 300;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }

  .btn-report {
    background: var(--amber);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .btn-report:hover { background: #b8700a; }

  /* LAYOUT */
  .app-body {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* PANNELLO LATERALE */
  .side-panel {
    width: var(--panel);
    background: var(--paper);
    overflow-y: auto;
    flex-shrink: 0;
    border-right: 1px solid rgba(26,18,8,0.1);
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  .panel-header {
    padding: 1rem 1.2rem;
    border-bottom: 1px solid rgba(26,18,8,0.08);
    background: white;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .stat-box {
    background: var(--mist);
    border-radius: 8px;
    padding: 0.5rem 0.4rem;
    text-align: center;
  }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 800;
    display: block;
    line-height: 1;
  }

  .stat-lbl {
    font-size: 0.65rem;
    color: #8a7f70;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .stat-box.urgent .stat-num { color: var(--rust); }
  .stat-box.resolved .stat-num { color: var(--sage); }

  /* FILTRI */
  .filters { padding: 0.8rem 1.2rem; border-bottom: 1px solid rgba(26,18,8,0.08); }

  .filter-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: #8a7f70;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
    display: block;
  }

  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 0.6rem;
  }

  .chip {
    padding: 0.28rem 0.65rem;
    border-radius: 999px;
    border: 1.5px solid rgba(26,18,8,0.15);
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
    color: var(--ink);
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--amber); }
  .chip.active { background: var(--ink); color: white; border-color: var(--ink); }
  .chip.chip-alta.active { background: var(--rust); border-color: var(--rust); }
  .chip.chip-normale.active { background: var(--amber); border-color: var(--amber); }
  .chip.chip-bassa.active { background: var(--sage); border-color: var(--sage); }

  /* LISTA SEGNALAZIONI */
  .report-list { flex: 1; padding: 0.8rem; }

  .report-item {
    background: white;
    border-radius: 10px;
    border: 1px solid rgba(26,18,8,0.08);
    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .report-item:hover {
    border-color: var(--amber);
    box-shadow: 0 2px 10px var(--shadow);
    transform: translateX(2px);
  }

  .report-item.highlighted { border-color: var(--amber); background: rgba(212,130,10,0.04); }

  .ri-top { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.3rem; }

  .ri-emoji { font-size: 1.2rem; flex-shrink: 0; line-height: 1; }

  .ri-cat {
    font-size: 0.78rem;
    font-weight: 600;
    line-height: 1.2;
    flex: 1;
  }

  .urgency-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .urgency-dot.alta { background: var(--rust); }
  .urgency-dot.normale { background: var(--amber); }
  .urgency-dot.bassa { background: var(--sage); }

  .ri-addr {
    font-size: 0.72rem;
    color: #8a7f70;
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ri-meta { display: flex; gap: 0.5rem; align-items: center; }

  .ri-date { font-size: 0.68rem; color: #a8a090; }

  .stato-badge {
    font-size: 0.62rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .stato-nuova { background: rgba(212,130,10,0.15); color: #b8700a; }
  .stato-lavorazione { background: rgba(26,18,200,0.1); color: #1a12c8; }
  .stato-risolta { background: rgba(61,90,71,0.15); color: var(--sage); }
  .stato-chiusa { background: rgba(26,18,8,0.08); color: #8a7f70; }

  .no-results {
    text-align: center;
    padding: 2rem 1rem;
    color: #8a7f70;
    font-size: 0.85rem;
  }

  /* MAPPA */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* POPUP LEAFLET */
  .leaflet-popup-content {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    min-width: 220px;
    max-width: 280px;
  }

  .popup-cat {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .popup-row {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.2rem;
    font-size: 0.78rem;
    color: #5a5040;
    align-items: flex-start;
  }

  .popup-row span:first-child { flex-shrink: 0; }

  .popup-descr {
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid #eee;
    font-size: 0.78rem;
    color: #3a3020;
    font-style: italic;
    line-height: 1.4;
  }

  .popup-id {
    margin-top: 0.5rem;
    font-size: 0.68rem;
    color: #a8a090;
    font-family: monospace;
  }

  /* LOADING */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(245,240,232,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    gap: 1rem;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--mist);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay p { font-size: 0.85rem; color: #8a7f70; }

  /* LEGENDA */
  .legend {
    position: absolute;
    bottom: 2rem;
    right: 1rem;
    background: white;
    border-radius: 10px;
    padding: 0.8rem 1rem;
    box-shadow: 0 2px 12px var(--shadow);
    z-index: 100;
    font-size: 0.75rem;
  }

  .legend-title { font-weight: 600; margin-bottom: 0.4rem; font-size: 0.72rem; color: #8a7f70; text-transform: uppercase; letter-spacing: 0.05em; }

  .legend-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.2rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* MOBILE */
  @media (max-width: 640px) {
    .side-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 45vh;
      border-right: none;
      border-top: 1px solid rgba(26,18,8,0.1);
    }

    .app-body { flex-direction: column; }

    #map { flex: none; height: 55vh; }

    .legend { bottom: 47vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">📍</div>
  <div>
    <h1>SegnalaOra</h1>
    <p>Mappa segnalazioni civiche</p>
  </div>
  <div class="header-right">
    <a href="segnalazione-civica.html" class="btn-report">+ Nuova segnalazione</a>
  </div>
</header>

<div class="app-body">

  <!-- PANNELLO -->
  <div class="side-panel">
    <div class="panel-header">
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-num" id="statTot">—</span>
          <span class="stat-lbl">Totali</span>
        </div>
        <div class="stat-box urgent">
          <span class="stat-num" id="statWait">—</span>
          <span class="stat-lbl">In attesa</span>
        </div>
        <div class="stat-box resolved">
          <span class="stat-num" id="statRes">—</span>
          <span class="stat-lbl">Risolte</span>
        </div>
      </div>

      <div class="filters">
        <span class="filter-label">Urgenza</span>
        <div class="filter-chips" id="urgFilter">
          <div class="chip active" data-val="all" onclick="setFilter('urgenza','all',this)">Tutte</div>
          <div class="chip chip-alta" data-val="Alta" onclick="setFilter('urgenza','Alta',this)">🔴 Alta</div>
          <div class="chip chip-normale" data-val="Normale" onclick="setFilter('urgenza','Normale',this)">🟡 Normale</div>
          <div class="chip chip-bassa" data-val="Bassa" onclick="setFilter('urgenza','Bassa',this)">🟢 Bassa</div>
        </div>

        <span class="filter-label">Stato</span>
        <div class="filter-chips" id="statoFilter">
          <div class="chip active" data-val="all" onclick="setFilter('stato','all',this)">Tutti</div>
          <div class="chip" data-val="Nuova" onclick="setFilter('stato','Nuova',this)">Nuova</div>
          <div class="chip" data-val="In lavorazione" onclick="setFilter('stato','In lavorazione',this)">In lavorazione</div>
          <div class="chip" data-val="Risolta" onclick="setFilter('stato','Risolta',this)">Risolta</div>
        </div>
      </div>
    </div>

    <div class="report-list" id="reportList">
      <div class="no-results">Caricamento segnalazioni...</div>
    </div>
  </div>

  <!-- MAPPA -->
  <div id="map"></div>

  <!-- LEGENDA -->
  <div class="legend">
    <div class="legend-title">Urgenza</div>
    <div class="legend-row"><div class="legend-dot" style="background:#c0392b"></div> Alta</div>
    <div class="legend-row"><div class="legend-dot" style="background:#d4820a"></div> Normale</div>
    <div class="legend-row"><div class="legend-dot" style="background:#3d5a47"></div> Bassa</div>
  </div>

  <!-- LOADING -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Caricamento segnalazioni...</p>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  CONFIGURAZIONE — stessa del file segnalazione-civica.html
// ─────────────────────────────────────────────
const SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsv5emsudeZOCiaREWWRFP14r5ZSmMW-WzwBTNv-aUitRaEb8mOy5dbm4KmBjpSwSSn2A-GAL7UGYz/pub?gid=0&single=true&output=csv';
// Sostituisci con l'URL del tuo Google Sheet pubblicato come CSV
// Es: 'https://docs.google.com/spreadsheets/d/ID/pub?gid=0&single=true&output=csv'

// Posizione default della mappa (centro Italia)
const MAP_DEFAULT = { lat: 41.9028, lng: 12.4964, zoom: 6 };

// ─────────────────────────────────────────────
//  STATO
// ─────────────────────────────────────────────
let allReports = [];
let filteredReports = [];
let markers = [];
let map;
let activeFilters = { urgenza: 'all', stato: 'all' };
let highlightedId = null;

// ─────────────────────────────────────────────
//  MAPPA INIT
// ─────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView(
    [MAP_DEFAULT.lat, MAP_DEFAULT.lng], MAP_DEFAULT.zoom
  );

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);
}

// ─────────────────────────────────────────────
//  CARICAMENTO CSV
// ─────────────────────────────────────────────
async function loadData() {
  if (!SHEETS_CSV_URL) {
    showDemoData();
    return;
  }

  try {
    const res = await fetch(SHEETS_CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    allReports = parseCSV(text);
    renderAll();
  } catch(e) {
    showError('Impossibile caricare i dati. Verifica la configurazione SHEETS_CSV_URL.');
  }

  document.getElementById('loadingOverlay').style.display = 'none';
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];

  const headers = parseCSVLine(lines[0]);
  const reports = [];

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h.trim()] = (vals[idx] || '').trim();
    });
    // Salta righe senza latitudine valida
    if (!obj.Lat || isNaN(parseFloat(obj.Lat))) continue;
    reports.push(obj);
  }

  return reports;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

// ─────────────────────────────────────────────
//  DATI DEMO (quando SHEETS_CSV_URL non configurato)
// ─────────────────────────────────────────────
function showDemoData() {
  const now = new Date();
  const fmt = d => d.toLocaleDateString('it-IT');

  allReports = [
    { ID_Segnalazione:'SGN-demo1', Data: fmt(now), Categoria:'Buche e dissesti stradali', Categoria_Emoji:'🕳️', Urgenza:'Alta', Descrizione:'Buca profonda 30cm in mezzo alla carreggiata', Nome_Segnalante:'Mario R.', Indirizzo_Completo:'Via Roma 12, Roma', Via:'Via Roma', Comune:'Roma', Lat:'41.8960', Long:'12.4820', Stato:'Nuova', Fonte_Posizione:'GPS' },
    { ID_Segnalazione:'SGN-demo2', Data: fmt(new Date(now-86400000)), Categoria:'Illuminazione pubblica guasta', Categoria_Emoji:'💡', Urgenza:'Normale', Descrizione:'Lampione spento da 3 giorni', Nome_Segnalante:'Anna B.', Indirizzo_Completo:'Corso Vittorio 88, Roma', Via:'Corso Vittorio', Comune:'Roma', Lat:'41.8990', Long:'12.4760', Stato:'In lavorazione', Fonte_Posizione:'GPS' },
    { ID_Segnalazione:'SGN-demo3', Data: fmt(new Date(now-172800000)), Categoria:'Rifiuti abbandonati', Categoria_Emoji:'🗑️', Urgenza:'Normale', Descrizione:'Cumulo di rifiuti ingombranti sul marciapiede', Nome_Segnalante:'Luca M.', Indirizzo_Completo:'Via dei Fori 5, Roma', Via:'Via dei Fori', Comune:'Roma', Lat:'41.8924', Long:'12.4853', Stato:'Risolta', Fonte_Posizione:'EXIF' },
    { ID_Segnalazione:'SGN-demo4', Data: fmt(new Date(now-259200000)), Categoria:'Segnaletica danneggiata', Categoria_Emoji:'🚧', Urgenza:'Bassa', Descrizione:'Cartello stradale divelta dal vento', Nome_Segnalante:'Sara T.', Indirizzo_Completo:'Piazza Navona, Roma', Via:'Piazza Navona', Comune:'Roma', Lat:'41.8992', Long:'12.4730', Stato:'Nuova', Fonte_Posizione:'Manuale' },
    { ID_Segnalazione:'SGN-demo5', Data: fmt(new Date(now-345600000)), Categoria:'Alberi e verde pubblico', Categoria_Emoji:'🌳', Urgenza:'Alta', Descrizione:'Albero pericolante dopo la tempesta', Nome_Segnalante:'Paolo G.', Indirizzo_Completo:'Viale Trastevere 200, Roma', Via:'Viale Trastevere', Comune:'Roma', Lat:'41.8860', Long:'12.4700', Stato:'Risolta', Fonte_Posizione:'GPS' },
  ];

  document.getElementById('loadingOverlay').style.display = 'none';

  // Avviso demo
  const notice = document.createElement('div');
  notice.style.cssText = 'position:absolute;top:1rem;left:50%;transform:translateX(-50%);background:#fff8e1;border:1.5px solid #ffd54f;border-radius:8px;padding:0.6rem 1rem;font-size:0.75rem;z-index:300;color:#5a4000;white-space:nowrap;';
  notice.textContent = '⚠ Dati demo — configura SHEETS_CSV_URL per dati reali';
  document.querySelector('.app-body').appendChild(notice);

  renderAll();
}

function showError(msg) {
  document.getElementById('loadingOverlay').innerHTML =
    `<p style="color:#c0392b;padding:1rem;text-align:center;">${msg}</p>`;
}

// ─────────────────────────────────────────────
//  FILTRI
// ─────────────────────────────────────────────
function setFilter(type, val, el) {
  activeFilters[type] = val;

  // Aggiorna chip attivo nel gruppo
  const group = el.parentElement;
  group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');

  renderAll();
}

function applyFilters() {
  return allReports.filter(r => {
    if (activeFilters.urgenza !== 'all' && r.Urgenza !== activeFilters.urgenza) return false;
    if (activeFilters.stato !== 'all' && r.Stato !== activeFilters.stato) return false;
    return true;
  });
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderAll() {
  filteredReports = applyFilters();
  updateStats();
  renderMarkers();
  renderList();
}

function updateStats() {
  const tot = allReports.length;
  const wait = allReports.filter(r => r.Stato === 'Nuova' || r.Stato === 'In lavorazione').length;
  const res = allReports.filter(r => r.Stato === 'Risolta').length;
  document.getElementById('statTot').textContent = tot;
  document.getElementById('statWait').textContent = wait;
  document.getElementById('statRes').textContent = res;
}

const URGENCY_COLORS = { 'Alta': '#c0392b', 'Normale': '#d4820a', 'Bassa': '#3d5a47' };

function makeMarkerIcon(urgenza) {
  const color = URGENCY_COLORS[urgenza] || '#d4820a';
  return L.divIcon({
    className: '',
    html: `<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 0C6.3 0 0 6.3 0 14c0 9.8 14 22 14 22S28 23.8 28 14C28 6.3 21.7 0 14 0z" fill="${color}"/>
      <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
    </svg>`,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -36]
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const idSet = new Set(filteredReports.map(r => r.ID_Segnalazione));

  filteredReports.forEach(report => {
    const lat = parseFloat(report.Lat);
    const lng = parseFloat(report.Long);
    if (isNaN(lat) || isNaN(lng)) return;

    const m = L.marker([lat, lng], { icon: makeMarkerIcon(report.Urgenza) });
    m.bindPopup(makePopupHTML(report), { maxWidth: 300 });
    m.on('click', () => highlightListItem(report.ID_Segnalazione));
    m.addTo(map);
    markers.push(m);
  });

  // Adatta zoom ai marker visibili
  if (markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.15));
  }
}

function makePopupHTML(r) {
  const urgColor = URGENCY_COLORS[r.Urgenza] || '#d4820a';
  const addrShort = (r.Via ? r.Via + (r.Numero_Civico ? ' ' + r.Numero_Civico : '') + ', ' : '') +
                    (r.Comune || r.Indirizzo_Completo || '');

  let html = `<div class="popup-cat">${r.Categoria_Emoji || '📌'} ${r.Categoria}</div>`;
  html += `<div class="popup-row"><span>📌</span><span>${addrShort || r.Indirizzo_Completo}</span></div>`;
  html += `<div class="popup-row"><span>📅</span><span>${r.Data} ${r.Ora || ''}</span></div>`;
  html += `<div class="popup-row">
    <span style="color:${urgColor};font-weight:600">${
      r.Urgenza === 'Alta' ? '🔴' : r.Urgenza === 'Bassa' ? '🟢' : '🟡'
    } ${r.Urgenza}</span>
    <span style="margin-left:0.5rem">${makeStatoBadge(r.Stato)}</span>
  </div>`;
  if (r.Nome_Segnalante) {
    html += `<div class="popup-row"><span>👤</span><span>${r.Nome_Segnalante}</span></div>`;
  }
  if (r.Descrizione) {
    html += `<div class="popup-descr">${r.Descrizione.substring(0, 120)}${r.Descrizione.length > 120 ? '...' : ''}</div>`;
  }
  html += `<div class="popup-id">${r.ID_Segnalazione}</div>`;
  return html;
}

function makeStatoBadge(stato) {
  const cls = { 'Nuova': 'stato-nuova', 'In lavorazione': 'stato-lavorazione', 'Risolta': 'stato-risolta', 'Chiusa': 'stato-chiusa' };
  return `<span class="stato-badge ${cls[stato] || 'stato-nuova'}">${stato || 'Nuova'}</span>`;
}

function renderList() {
  const list = document.getElementById('reportList');

  if (filteredReports.length === 0) {
    list.innerHTML = '<div class="no-results">Nessuna segnalazione trovata con i filtri selezionati.</div>';
    return;
  }

  list.innerHTML = filteredReports.map(r => {
    const addrShort = r.Via || r.Comune || r.Indirizzo_Completo || 'Posizione non specificata';
    const urg = (r.Urgenza || 'Normale').toLowerCase();
    return `<div class="report-item" id="ri-${r.ID_Segnalazione}" onclick="focusReport('${r.ID_Segnalazione}')">
      <div class="ri-top">
        <span class="ri-emoji">${r.Categoria_Emoji || '📌'}</span>
        <span class="ri-cat">${r.Categoria}</span>
        <div class="urgency-dot ${urg}"></div>
      </div>
      <div class="ri-addr">${addrShort}</div>
      <div class="ri-meta">
        <span class="ri-date">${r.Data || ''}</span>
        ${makeStatoBadge(r.Stato)}
      </div>
    </div>`;
  }).join('');
}

function focusReport(id) {
  const report = filteredReports.find(r => r.ID_Segnalazione === id);
  if (!report) return;

  const lat = parseFloat(report.Lat);
  const lng = parseFloat(report.Long);
  if (!isNaN(lat) && !isNaN(lng)) {
    map.setView([lat, lng], 17, { animate: true });
    // Apri popup del marker corrispondente
    const idx = filteredReports.indexOf(report);
    if (markers[idx]) markers[idx].openPopup();
  }

  highlightListItem(id);
}

function highlightListItem(id) {
  document.querySelectorAll('.report-item').forEach(el => el.classList.remove('highlighted'));
  const el = document.getElementById('ri-' + id);
  if (el) {
    el.classList.add('highlighted');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
initMap();
loadData();
</script>
