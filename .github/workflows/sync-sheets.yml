name: Sincronizza Google Sheets

# ─────────────────────────────────────────────────────────────
#  Questo workflow scarica il CSV pubblicato da Google Sheets
#  e lo salva in  dati/segnalazioni.csv  nel repository.
#
#  In questo modo index.html può leggere il CSV da GitHub
#  (più veloce, nessun problema CORS, funziona anche offline).
#
#  Prerequisiti:
#    - Il foglio Google Sheets deve essere pubblicato come CSV
#      (File → Pubblica sul Web → Formato: CSV → Copia URL)
#    - Aggiorna SHEETS_CSV_URL qui sotto se cambia l'URL
# ─────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/30 * * * *'   # ogni 30 minuti (min. intervallo GitHub)
  workflow_dispatch:           # avvio manuale da GitHub → Actions

permissions:
  contents: write              # necessario per il commit/push

env:
  SHEETS_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsv5emsudeZOCiaREWWRFP14r5ZSmMW-WzwBTNv-aUitRaEb8mOy5dbm4KmBjpSwSSn2A-GAL7UGYz/pub?gid=0&single=true&output=csv"

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Scarica CSV e aggiorna repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica CSV da Google Sheets
        run: |
          echo "Scaricando CSV da Google Sheets..."
          curl -L \
            "$SHEETS_CSV_URL" \
            --output dati/segnalazioni.csv \
            --fail \
            --silent \
            --show-error
          echo "File scaricato: $(wc -l < dati/segnalazioni.csv) righe"

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dati/segnalazioni.csv

          if git diff --cached --quiet; then
            echo "Nessuna modifica rispetto alla versione precedente — skip commit."
          else
            # Conta le segnalazioni (righe senza l'intestazione)
            ROWS=$(tail -n +2 dati/segnalazioni.csv | grep -c . 2>/dev/null || echo "?")
            git commit -m "sync: ${ROWS} segnalazioni da Google Sheets [skip ci]"
            git push
            echo "Commit eseguito: ${ROWS} segnalazioni."
          fi
