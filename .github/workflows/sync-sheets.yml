name: Sincronizza Google Sheets

# ─────────────────────────────────────────────────────────────
#  Scarica i due CSV pubblicati da Google Sheets e li salva in dati/:
#    dati/segnalazioni.csv  ← foglio 'Aperte'
#    dati/risolte.csv       ← foglio 'Risolte'
#
#  Se un file risulta aggiornato, il precedente viene salvato
#  come backup in dati/backup/ con timestamp UTC nel nome.
# ─────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/30 * * * *'   # ogni 30 minuti (min. intervallo GitHub)
  workflow_dispatch:           # avvio manuale da GitHub → Actions

permissions:
  contents: write              # necessario per il commit/push

env:
  CSV_APERTE:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRzGnyHVzcSbnLKsp1gkFi5a8xJeeFTK8YhmA67XJUEGaJIQ5sMNwqG4Jdhxg9DqaAWU2bdWGHGfnpR/pub?gid=144049557&single=true&output=csv"
  CSV_RISOLTE: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRzGnyHVzcSbnLKsp1gkFi5a8xJeeFTK8YhmA67XJUEGaJIQ5sMNwqG4Jdhxg9DqaAWU2bdWGHGfnpR/pub?gid=707341479&single=true&output=csv"

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Scarica CSV e aggiorna repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica CSV da Google Sheets
        run: |
          mkdir -p tmp_csv dati/backup

          echo "Scaricando segnalazioni aperte..."
          curl -L "$CSV_APERTE"  --output tmp_csv/segnalazioni.csv --fail --silent --show-error
          echo "  → $(wc -l < tmp_csv/segnalazioni.csv) righe"

          echo "Scaricando segnalazioni risolte..."
          curl -L "$CSV_RISOLTE" --output tmp_csv/risolte.csv     --fail --silent --show-error
          echo "  → $(wc -l < tmp_csv/risolte.csv) righe"

      - name: Backup e sostituzione file aggiornati
        run: |
          python3 << 'PYEOF'
          import os, shutil, hashlib
          from datetime import datetime

          BACKUP_DIR = "dati/backup"
          os.makedirs(BACKUP_DIR, exist_ok=True)

          # Timestamp UTC per il nome del backup
          timestamp = datetime.utcnow().strftime("%Y-%m-%d_%H-%M")

          FILES = [
              ("tmp_csv/segnalazioni.csv", "dati/segnalazioni.csv"),
              ("tmp_csv/risolte.csv",      "dati/risolte.csv"),
          ]

          def md5(path):
              with open(path, 'rb') as f:
                  return hashlib.md5(f.read()).hexdigest()

          for tmp_path, dest_path in FILES:
              stem = os.path.basename(dest_path).replace('.csv', '')

              if not os.path.exists(tmp_path):
                  print(f"⚠️  {tmp_path} non trovato, skip.")
                  continue

              if not os.path.exists(dest_path):
                  # Prima esecuzione: crea il file senza backup
                  shutil.copy2(tmp_path, dest_path)
                  print(f"✓ {dest_path}: creato ({os.path.getsize(dest_path):,} bytes)")
              elif md5(dest_path) == md5(tmp_path):
                  print(f"─ {dest_path}: nessuna modifica.")
              else:
                  # File cambiato → salva backup del precedente, poi sostituisci
                  backup_name = f"{timestamp}_{stem}.csv"
                  backup_path = os.path.join(BACKUP_DIR, backup_name)
                  shutil.copy2(dest_path, backup_path)
                  shutil.copy2(tmp_path,  dest_path)
                  old_kb = os.path.getsize(backup_path) // 1024
                  new_kb = os.path.getsize(dest_path)   // 1024
                  print(f"✓ {dest_path}: aggiornato ({old_kb}KB → {new_kb}KB)")
                  print(f"  └─ backup: {backup_path}")
          PYEOF

      - name: Rimuovi colonne private dai CSV pubblici
        run: |
          python3 << 'PYEOF'
          import csv, os

          # Colonne da non esporre nei CSV pubblici (dati personali + token sicurezza)
          PRIVATE_COLS = [
              'Token_Risoluzione',  # codice interno di risoluzione
              'Email_Segnalante',   # dato personale — GDPR Art. 4(1)
              'Nome_Segnalante',    # dato personale
              'Testo_Messaggio',    # contiene email e nome incorporati nel testo
          ]

          def strip_private(path):
              if not os.path.exists(path):
                  print(f"{path} non trovato, skip.")
                  return
              with open(path, newline='', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  rows       = list(reader)
                  fieldnames = list(reader.fieldnames or [])
              to_remove = [c for c in PRIVATE_COLS if c in fieldnames]
              if not to_remove:
                  print(f"{path}: nessuna colonna privata trovata — nessuna modifica.")
                  return
              public_fields = [c for c in fieldnames if c not in PRIVATE_COLS]
              with open(path, 'w', newline='', encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=public_fields, extrasaction='ignore')
                  writer.writeheader()
                  writer.writerows(rows)
              print(f"✓ {path}: rimosse {to_remove} ({len(rows)} righe)")

          strip_private("dati/segnalazioni.csv")
          strip_private("dati/risolte.csv")
          PYEOF

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dati/segnalazioni.csv dati/risolte.csv dati/backup/

          if git diff --cached --quiet; then
            echo "Nessuna modifica — skip commit."
          else
            APERTE=$(tail -n +2 dati/segnalazioni.csv | grep -c . 2>/dev/null || echo "?")
            RISOLTE=$(tail -n +2 dati/risolte.csv     | grep -c . 2>/dev/null || echo "?")
            git commit -m "sync: ${APERTE} aperte · ${RISOLTE} risolte [skip ci]"
            git push
            echo "Push: ${APERTE} aperte, ${RISOLTE} risolte."
          fi
