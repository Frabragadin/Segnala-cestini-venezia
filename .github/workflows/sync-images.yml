name: Scarica e ridimensiona immagini

# ─────────────────────────────────────────────────────────────
#  Questo workflow legge la colonna URL_Immagini dal CSV
#  già scaricato in  dati/segnalazioni.csv,  scarica ogni
#  immagine pubblica, la ridimensiona a max 1280px e la
#  salva in  img/{ID_Segnalazione}/foto_N.jpg  nel repository.
#
#  ⚠️  PREREQUISITI prima di attivare la pianificazione:
#
#  1. Le colonne  URL_Immagine  e  URL_Immagini  devono
#     essere presenti nel Google Sheet e in COLUMNS di
#     dati/apps-script.gs
#
#  2. Attiva la pianificazione cambiando i trigger qui sotto
#     (rimuovi i commenti #  davanti a  schedule / workflow_run)
#
#  Le immagini già presenti in  img/  vengono saltate
#  (nessun riscaricare doppio).
# ─────────────────────────────────────────────────────────────

on:
  # -- Attiva queste righe dopo aver configurato URL_Immagine --
  # schedule:
  #   - cron: '15 */2 * * *'   # ogni 2 ore (offset di 15 min rispetto a sync-sheets)
  # workflow_run:
  #   workflows: ["Sincronizza Google Sheets"]
  #   types: [completed]
  # ------------------------------------------------------------
  workflow_dispatch:            # manuale da GitHub → Actions

permissions:
  contents: write

jobs:
  images:
    runs-on: ubuntu-latest
    name: Scarica immagini e commit
    # Se attivato da workflow_run, esegui solo se sync-sheets è riuscito
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa dipendenze Python
        run: pip install --quiet Pillow requests

      - name: Scarica e ridimensiona immagini
        run: |
          python3 << 'PYEOF'
          import csv, os, sys
          import requests
          from PIL import Image
          from io import BytesIO

          CSV_FILE  = "dati/segnalazioni.csv"
          IMG_DIR   = "img"
          MAX_SIZE  = 1280    # px lato lungo massimo
          QUALITY   = 85      # qualità JPEG (0-95)
          TIMEOUT   = 20      # secondi per download

          os.makedirs(IMG_DIR, exist_ok=True)

          if not os.path.exists(CSV_FILE):
              print("⚠️  dati/segnalazioni.csv non trovato.")
              print("   Esegui prima il workflow 'Sincronizza Google Sheets'.")
              sys.exit(0)

          with open(CSV_FILE, newline='', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              rows = list(reader)

          if not rows:
              print("⚠️  CSV vuoto.")
              sys.exit(0)

          downloaded, skipped, errors = 0, 0, 0

          def download_and_save(url, out_path, label):
              global downloaded, skipped, errors
              if os.path.exists(out_path):
                  skipped += 1
                  return
              try:
                  print(f"↓ {label}: {url[:70]}...")
                  resp = requests.get(url, timeout=TIMEOUT)
                  resp.raise_for_status()
                  img = Image.open(BytesIO(resp.content)).convert('RGB')
                  w, h = img.size
                  if w > MAX_SIZE or h > MAX_SIZE:
                      ratio = min(MAX_SIZE / w, MAX_SIZE / h)
                      img = img.resize((int(w * ratio), int(h * ratio)), Image.LANCZOS)
                  os.makedirs(os.path.dirname(out_path), exist_ok=True)
                  img.save(out_path, 'JPEG', quality=QUALITY, optimize=True)
                  size_kb = os.path.getsize(out_path) // 1024
                  print(f"  ✓ {img.size[0]}×{img.size[1]}px  {size_kb}KB → {out_path}")
                  downloaded += 1
              except Exception as e:
                  print(f"  ✗ errore: {e}")
                  errors += 1

          for row in rows:
              id_seg = row.get('ID_Segnalazione', '').strip()
              if not id_seg:
                  continue

              # Leggi URL_Immagini (comma-separated, più foto) o URL_Immagine (singola)
              urls_raw = row.get('URL_Immagini', '').strip() or row.get('URL_Immagine', '').strip()
              if not urls_raw:
                  skipped += 1
                  continue

              urls = [u.strip() for u in urls_raw.split(',') if u.strip()]
              folder = os.path.join(IMG_DIR, id_seg)

              for i, url in enumerate(urls, start=1):
                  out_path = os.path.join(folder, f"foto_{i}.jpg")
                  download_and_save(url, out_path, f"{id_seg}/foto_{i}")

          print(f"\n── Riepilogo ──────────────────────")
          print(f"  Scaricate:  {downloaded}")
          print(f"  Saltate:    {skipped}")
          print(f"  Errori:     {errors}")
          PYEOF

      - name: Commit e push nuove immagini
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add img/

          if git diff --cached --quiet; then
            echo "Nessuna nuova immagine da committare — skip."
          else
            COUNT=$(git diff --cached --name-only | grep -c . 2>/dev/null || echo "?")
            git commit -m "sync: aggiunge ${COUNT} immagini [skip ci]"
            git push
            echo "Commit eseguito: ${COUNT} nuove immagini."
          fi
